services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: devorapp-db
    environment:
      POSTGRES_DB: tfg_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: devorapp-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/tfg_db
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_in_prod}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-firebase-service-account.json}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      KERAS_API_URL: ${KERAS_API_URL:-http://keras-api:8001/predict}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devorapp-net

  # ── React frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: devorapp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - devorapp-net

volumes:
  postgres_data:

networks:
  devorapp-net:
    driver: bridge
