name: CI/CD Pipeline

on:
  push:
    branches: [ main, desarrollo ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  # ─── BACKEND TEST & BUILD ───────────────────────────────────────────────────
  backend-ci:
    name: Backend Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'poetry'
          cache-dependency-path: backend/poetry.lock

      - name: Install postgres dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Install backend dependencies
        run: |
          cd backend
          poetry install --with dev

      - name: Run backend unit and integration tests
        run: |
          cd backend
          poetry run pytest tests/ -v --cov=app --cov-report=xml:coverage.xml

      - name: Install Keras API dependencies
        run: |
          cd keras-api
          pip install -r requirements.txt

      - name: Run Keras API tests
        run: |
          cd keras-api
          pytest test_main.py -v --cov=. --cov-report=xml:coverage.xml

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: Upload Keras Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keras-coverage
          path: keras-api/coverage.xml

  # ─── FRONTEND TEST & LINT ────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test -- --coverage

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ─── STATIC ANALYSIS (SONAR) ────────────────────────────────────────────────
  sonar-analysis:
    name: SonarQube static analysis
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download Backend Coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Download Keras Coverage
        uses: actions/download-artifact@v4
        with:
          name: keras-coverage
          path: keras-api

      - name: Download Frontend Coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          args: >
            -Dsonar.jasmin.internal.disabled=true
            -Dsonar.jasmin.internal.js.ts.disabled=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── DOCKER PACKAGING ────────────────────────────────────────────────────────
  build-docker-images:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    needs: [sonar-analysis]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Firebase service account file
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode > backend/firebase-service-account.json
          else
            echo '{}' > backend/firebase-service-account.json
          fi

      - name: Build and push Docker images
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Build backend
          docker build -t ${{ env.REGISTRY }}/$REPO_LOWER/backend:$SHORT_SHA -t ${{ env.REGISTRY }}/$REPO_LOWER/backend:latest ./backend
          docker push ${{ env.REGISTRY }}/$REPO_LOWER/backend:$SHORT_SHA
          docker push ${{ env.REGISTRY }}/$REPO_LOWER/backend:latest

          # Build frontend
          docker build -t ${{ env.REGISTRY }}/$REPO_LOWER/frontend:$SHORT_SHA -t ${{ env.REGISTRY }}/$REPO_LOWER/frontend:latest ./frontend
          docker push ${{ env.REGISTRY }}/$REPO_LOWER/frontend:$SHORT_SHA
          docker push ${{ env.REGISTRY }}/$REPO_LOWER/frontend:latest

          # Build keras-api (recommendation model service)
          docker build -t ${{ env.REGISTRY }}/$REPO_LOWER/keras-api:$SHORT_SHA -t ${{ env.REGISTRY }}/$REPO_LOWER/keras-api:latest ./keras-api
          docker push ${{ env.REGISTRY }}/$REPO_LOWER/keras-api:$SHORT_SHA
          docker push ${{ env.REGISTRY }}/$REPO_LOWER/keras-api:latest

          # If running on a tag, also push the version tag
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME="${{ github.ref_name }}"
            docker tag ${{ env.REGISTRY }}/$REPO_LOWER/backend:$SHORT_SHA ${{ env.REGISTRY }}/$REPO_LOWER/backend:$TAG_NAME
            docker push ${{ env.REGISTRY }}/$REPO_LOWER/backend:$TAG_NAME

            docker tag ${{ env.REGISTRY }}/$REPO_LOWER/frontend:$SHORT_SHA ${{ env.REGISTRY }}/$REPO_LOWER/frontend:$TAG_NAME
            docker push ${{ env.REGISTRY }}/$REPO_LOWER/frontend:$TAG_NAME

            docker tag ${{ env.REGISTRY }}/$REPO_LOWER/keras-api:$SHORT_SHA ${{ env.REGISTRY }}/$REPO_LOWER/keras-api:$TAG_NAME
            docker push ${{ env.REGISTRY }}/$REPO_LOWER/keras-api:$TAG_NAME
          fi

  # ─── TECHNICAL DOCUMENTATION (RELEASE ONLY) ──────────────────────────────────
  deploy-docs:
    name: Generate & Publish Sphinx Docs
    runs-on: ubuntu-latest
    needs: [sonar-analysis]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'poetry'
          cache-dependency-path: backend/poetry.lock

      - name: Install postgres dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Install backend dependencies
        run: |
          cd backend
          poetry install --with dev

      - name: Build documentation
        run: |
          cd backend
          poetry run sphinx-build -b html ../docs ../docs/_build/html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
